<div class="site-shell">
  <header class="site-header">
    <a class="brand" href="#top" aria-label="Xida Chen home">
      <span>Xida Chen</span>
      <small>Frontend Engineer</small>
    </a>

    <nav aria-label="Primary navigation">
      @for (item of content().nav; track item.href) {
        <a [href]="item.href">{{ item.label }}</a>
      }
    </nav>

    <button class="language-toggle" type="button" (click)="toggleLanguage()">
      {{ content().alternateLanguageName }}
    </button>
  </header>

  <main>
    <app-hero-section [content]="content().hero" />
    <app-services-section
      [title]="content().servicesTitle"
      [summary]="content().servicesSummary"
      [services]="content().services"
    />
    <app-case-studies-section
      [title]="content().casesTitle"
      [summary]="content().casesSummary"
      [cases]="content().cases"
    />
    <app-skills-section
      [title]="content().skillsTitle"
      [summary]="content().skillsSummary"
      [groups]="content().skillGroups"
    />
    <app-credentials-section
      [title]="content().credentialsTitle"
      [credentials]="content().credentials"
    />
    <app-contact-section [content]="content().contact" />
  </main>

  <app-site-footer [content]="content().footer" />
</div>
