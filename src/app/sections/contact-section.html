<section class="section contact" id="contact">
  <div class="contact__intro">
    <p class="eyebrow">{{ content().eyebrow }}</p>
    <h2>{{ content().title }}</h2>
    <p>{{ content().summary }}</p>
  </div>

  <form class="contact-form">
    <label>
      <span>{{ content().nameLabel }}</span>
      <input
        type="text"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        name="name"
        autocomplete="name"
      />
    </label>

    <label>
      <span>{{ content().emailLabel }}</span>
      <input
        type="email"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        name="email"
        autocomplete="email"
      />
    </label>

    <label>
      <span>{{ content().typeLabel }}</span>
      <select
        [ngModel]="projectType()"
        (ngModelChange)="projectType.set($event)"
        name="projectType"
      >
        <option value=""></option>
        @for (option of content().typeOptions; track $index) {
          <option [value]="option">{{ option }}</option>
        }
      </select>
    </label>

    <label class="contact-form__message">
      <span>{{ content().messageLabel }}</span>
      <textarea
        rows="5"
        [ngModel]="message()"
        (ngModelChange)="message.set($event)"
        name="message"
      ></textarea>
    </label>

    <a class="button button--primary" [href]="mailtoHref()">{{ content().submitLabel }}</a>
  </form>

  <div class="contact__fallback">
    <span>{{ content().fallbackLabel }}</span>
    <a [href]="'mailto:' + contactEmail">{{ contactEmail }}</a>
    <a [href]="linkedInUrl" target="_blank" rel="noreferrer">{{ content().linkedinLabel }}</a>
  </div>
</section>
