<section class="section contact" id="contact">
  <div class="contact__intro">
    <p class="eyebrow">{{ content().eyebrow }}</p>
    <h2>{{ content().title }}</h2>
    <p>{{ content().summary }}</p>
  </div>

  <form class="contact-form" #contactForm="ngForm" (ngSubmit)="submitForm()">
    <label>
      <span>{{ content().nameLabel }}</span>
      <input
        type="text"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        name="name"
        autocomplete="name"
        required
        [disabled]="submissionState() === 'sending'"
      />
    </label>

    <label>
      <span>{{ content().emailLabel }}</span>
      <input
        type="email"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        name="email"
        autocomplete="email"
        required
        [disabled]="submissionState() === 'sending'"
      />
    </label>

    <label>
      <span>{{ content().phoneLabel }}</span>
      <input
        type="tel"
        [ngModel]="phone()"
        (ngModelChange)="phone.set($event)"
        name="phone"
        autocomplete="tel"
        required
        [disabled]="submissionState() === 'sending'"
      />
    </label>

    <label>
      <span>{{ content().typeLabel }}</span>
      <select
        [ngModel]="projectType()"
        (ngModelChange)="projectType.set($event)"
        name="projectType"
        required
        [disabled]="submissionState() === 'sending'"
      >
        <option value=""></option>
        @for (option of content().typeOptions; track $index) {
          <option [value]="option">{{ option }}</option>
        }
      </select>
    </label>

    <label class="contact-form__message">
      <span>{{ content().messageLabel }}</span>
      <textarea
        rows="5"
        [ngModel]="message()"
        (ngModelChange)="message.set($event)"
        name="message"
        required
        [disabled]="submissionState() === 'sending'"
      ></textarea>
    </label>

    <button
      class="button button--primary"
      type="submit"
      [disabled]="submissionState() === 'sending' || contactForm.invalid || !isFormReady()"
    >
      {{ submissionState() === 'sending' ? content().sendingLabel : content().submitLabel }}
    </button>

    @if (submissionState() === 'sent') {
      <p class="contact-form__status contact-form__status--success">{{ content().sentLabel }}</p>
    }

    @if (submissionState() === 'error') {
      <p class="contact-form__status contact-form__status--error">{{ content().errorLabel }}</p>
    }
  </form>

  <div class="contact__fallback">
    <span>{{ content().fallbackLabel }}</span>
    <a [href]="'mailto:' + contactEmail">{{ contactEmail }}</a>
    <a [href]="linkedInUrl" target="_blank" rel="noreferrer">{{ content().linkedinLabel }}</a>
  </div>
</section>
